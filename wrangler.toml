name = "woo"
main = "src/worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1.0

[vars]
# Cloudflare deploys auto-install the bundled local catalogs listed here
# at first-light bootstrap (empty storage). The list runs once and the
# resulting bundle is persisted forever; flipping this variable on an
# existing deploy does not remove already-installed catalogs.
#
# The shipped default is the full demo bundle so that a fresh fork-and-
# deploy lands a populated world matching woo.hughpyle.workers.dev. For
# faster first-light on operator deployments that don't want the demo
# content, use the foundational-only subset — classes only, no bundled
# instances; first-light cost drops from a few seconds to tens of ms:
#   WOO_AUTO_INSTALL_CATALOGS = "chat,help,note,prog"
# For an entirely clean core world (no auto-install), set the empty
# string. See DEPLOY.md §WOO_AUTO_INSTALL_CATALOGS for details.
WOO_AUTO_INSTALL_CATALOGS = "chat,demoworld,dubspace,help,note,pinboard,prog,taskspace,blocks-demo"

# Static assets: the bundled SPA is built to dist/ via `npm run build`.
# The Worker entry routes global API/WS traffic to the gateway DO and object
# REST routes through Directory; everything else falls through to ASSETS.fetch.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[durable_objects.bindings]]
name = "WOO"
class_name = "PersistentObjectDO"

[[durable_objects.bindings]]
name = "DIRECTORY"
class_name = "DirectoryDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PersistentObjectDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DirectoryDO"]

# v3-v5 are the wipe dance. v3 created fresh SQLite storage under temporary
# V3 names, v4 dropped the original empty classes, v5 renames the V3 storage
# back to the clean names. The class names in code are unchanged; the version
# tags are CF-side bookkeeping only.
[[migrations]]
tag = "v3-create-2026-05-02"
new_sqlite_classes = ["PersistentObjectV3DO", "DirectoryV3DO"]

[[migrations]]
tag = "v4-drop-old-2026-05-02"
deleted_classes = ["PersistentObjectDO", "DirectoryDO"]

[[migrations]]
tag = "v5-rename-back-2026-05-02"
renamed_classes = [
  { from = "PersistentObjectV3DO", to = "PersistentObjectDO" },
  { from = "DirectoryV3DO", to = "DirectoryDO" }
]

# Optional staging slot. Uncomment, rename to taste, and deploy with:
#   wrangler deploy --env staging
# The staging worker gets its own DO storage namespace; cost is per-request
# + DO storage proportional to staging data (idle stagings are near-zero).
# See DEPLOY.md "Pre-deploy testing" for usage.
#
# [env.staging]
# name = "woo-staging"
#
# [[env.staging.durable_objects.bindings]]
# name = "WOO"
# class_name = "PersistentObjectDO"
#
# [[env.staging.durable_objects.bindings]]
# name = "DIRECTORY"
# class_name = "DirectoryDO"
#
# [env.staging.assets]
# directory = "./dist"
# binding = "ASSETS"
# not_found_handling = "single-page-application"
#
# [env.staging.vars]
# # Inherits the production default (foundational only). Override here to
# # smoke-test demo catalogs in staging:
# # WOO_AUTO_INSTALL_CATALOGS = "chat,demoworld,dubspace,help,note,pinboard,prog,taskspace,blocks-demo"
